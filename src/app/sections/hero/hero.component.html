<section
  class="min-h-[calc(100vh-64px)] grid md:grid-cols-2 gap-8 md:gap-12 items-center relative overflow-visible py-10 md:py-0 px-1 sm:px-0"
  observeInView
  (inView)="heroIn = true"
>
  <!-- Subtle background glow -->
  <div class="absolute top-1/2 right-1/4 -translate-y-1/2 w-[500px] h-[500px] bg-blue-500/5 rounded-full blur-[120px] pointer-events-none"></div>

  <div [@slideInLeft]="heroIn ? 'in' : 'out'" class="relative z-10">
    <p class="text-blue-400 text-sm font-medium tracking-widest uppercase mb-4">
      Hello, I'm
    </p>
    <h1
      class="text-4xl md:text-5xl lg:text-6xl font-semibold leading-[1.1] tracking-tight text-white"
    >
      Rania <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">Ismail</span>
    </h1>
    <h2 class="text-lg md:text-xl text-zinc-400 font-light mt-3 tracking-wide">
      Software Developer
    </h2>
    <p class="mt-6 text-zinc-300 text-sm md:text-[15px] leading-relaxed max-w-md">
      4+ years building modern web apps with Angular, React, Vue, and JavaScript frameworks.
      I craft clean, fast, and accessible interfaces that users actually enjoy.
    </p>

    <div class="mt-8 flex items-center gap-3" [@fadeInUp]="heroIn ? 'in' : 'out'">
      <a
        href="http://www.linkedin.com/in/raniaismaeil"
        target="_blank"
        rel="noopener"
        class="w-9 h-9 flex items-center justify-center rounded-full bg-zinc-800/80 border-none hover:bg-zinc-600 hover:scale-110 transition-all duration-300"
        aria-label="LinkedIn"
      >
        <i class="pi pi-linkedin text-zinc-400 text-sm"></i>
      </a>
      <a
        href="https://github.com/RaniaIsmaeil"
        target="_blank"
        rel="noopener"
        class="w-9 h-9 flex items-center justify-center rounded-full bg-zinc-800/80 border-none hover:bg-zinc-600 hover:scale-110 transition-all duration-300"
        aria-label="GitHub"
      >
        <i class="pi pi-github text-zinc-400 text-sm"></i>
      </a>
      <a
        href="mailto:ranyasmael@gmail.com"
        class="w-9 h-9 flex items-center justify-center rounded-full bg-zinc-800/80 border-none hover:bg-zinc-600 hover:scale-110 transition-all duration-300"
        aria-label="Email"
      >
        <i class="pi pi-envelope text-zinc-400 text-sm"></i>
      </a>
    </div>
  </div>

  <div class="flex justify-center md:justify-end relative z-10 order-first md:order-last" [@slideInRight]="heroIn ? 'in' : 'out'">
    <div class="relative">
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-72 md:w-[30rem] md:h-[30rem] bg-blue-500/20 rounded-full blur-[100px] pointer-events-none"></div>
      <div class="w-52 h-52 sm:w-64 sm:h-64 md:w-[22rem] md:h-[22rem] rounded-full overflow-hidden relative">
        <img
          src="./assets/images/profile.jpeg"
          alt="Rania Ismail"
          class="w-full h-full object-cover"
        />
      </div>
    </div>
  </div>
</section>
