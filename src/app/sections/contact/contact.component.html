<section
  id="contact"
  class="container-p"
  observeInView
  (inView)="contactIn = true"
  [@fadeUp]="contactIn ? 'in' : 'out'"
>
  <h2 class="text-3xl font-bold text-center mb-2 text-white">
    Let's <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">Connect</span>
  </h2>
  <p class="text-center text-zinc-400 mb-10">
    Reach out for opportunities or just to say hi!
  </p>

  <div class="max-w-lg mx-auto grid gap-4">
    <!-- Email -->
    <div
      class="flex items-center gap-4 bg-zinc-600/20 border border-zinc-500/30 rounded-2xl p-5"
    >
      <span class="w-10 h-10 flex items-center justify-center rounded-lg bg-gradient-to-br from-blue-500/20 to-cyan-400/10">
        <mat-icon class="text-cyan-400" style="font-size: 20px; width: 20px; height: 20px;">mail</mat-icon>
      </span>
      <div>
        <p class="text-sm text-zinc-400">Email</p>
        <p class="text-white">ranyasmael&#64;gmail.com</p>
      </div>
    </div>

    <!-- Phone -->
    <div
      class="flex items-center gap-4 bg-zinc-600/20 border border-zinc-500/30 rounded-2xl p-5"
    >
      <span class="w-10 h-10 flex items-center justify-center rounded-lg bg-gradient-to-br from-blue-500/20 to-cyan-400/10">
        <mat-icon class="text-cyan-400" style="font-size: 20px; width: 20px; height: 20px;">phone</mat-icon>
      </span>
      <div>
        <p class="text-sm text-zinc-400">Phone</p>
        <p class="text-white">+961 71 228 608</p>
      </div>
    </div>

    <!-- Location -->
    <div
      class="flex items-center gap-4 bg-zinc-600/20 border border-zinc-500/30 rounded-2xl p-5"
    >
      <span class="w-10 h-10 flex items-center justify-center rounded-lg bg-gradient-to-br from-blue-500/20 to-cyan-400/10">
        <mat-icon class="text-cyan-400" style="font-size: 20px; width: 20px; height: 20px;">location_on</mat-icon>
      </span>
      <div>
        <p class="text-sm text-zinc-400">Location</p>
        <p class="text-white">Beirut, Lebanon</p>
      </div>
    </div>
  </div>
</section>
