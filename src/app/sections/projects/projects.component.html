<section
  id="projects"
  class="container-p"
  observeInView
  (inView)="projectsIn = true"
  [@fadeUp]="projectsIn ? 'in' : 'out'"
>
  <h2 class="text-3xl font-bold text-center mb-2 text-white">
    Featured <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">Projects</span>
  </h2>
  <p class="text-center text-zinc-400 mb-12">
    Here are some of my recent projects that showcase my skills in frontend
    development
  </p>

  <div class="space-y-8">
    <article
      *ngFor="let p of projects; let i = index"
      class="project-card group grid md:grid-cols-[1fr_1.2fr] gap-5 sm:gap-6 bg-zinc-600/20 border border-zinc-500/30 rounded-2xl p-4 sm:p-5 md:p-6 hover:bg-zinc-600/30 transition-all duration-300"
    >
      <!-- Image -->
      <div class="overflow-hidden rounded-xl">
        <img
          [src]="p.image"
          [alt]="p.title"
          class="w-full h-44 sm:h-52 md:h-full object-cover rounded-xl group-hover:scale-105 transition-transform duration-500"
        />
      </div>

      <!-- Content -->
      <div class="flex flex-col justify-center">
        <h3 class="text-xl font-semibold text-white mb-2 group-hover:text-cyan-300 transition-colors">
          {{ p.title }}
        </h3>
        <p class="text-sm text-zinc-300 mb-4 leading-relaxed">
          {{ p.description }}
        </p>

        <div class="flex flex-wrap gap-2 mb-5">
          <span
            *ngFor="let t of p.tech"
            class="px-2.5 py-1 text-xs rounded-md bg-blue-500/10 text-blue-300 border border-blue-500/20"
          >{{ t }}</span>
        </div>

        <div class="flex gap-3">
          <a
            *ngIf="p.link"
            class="inline-flex items-center gap-1.5 text-sm font-medium text-white bg-gradient-to-r from-blue-600 to-cyan-500 hover:opacity-90 px-4 py-2 rounded-lg transition-all duration-200"
            [href]="p.link"
            target="_blank"
          >
            <i class="pi pi-external-link text-xs"></i> Live Demo
          </a>
          <a
            *ngIf="p.repo"
            class="inline-flex items-center gap-1.5 text-sm font-medium text-zinc-300 hover:text-white px-4 py-2 rounded-lg border border-zinc-600 hover:border-zinc-400 transition-all duration-200"
            [href]="p.repo"
            target="_blank"
          >
            <i class="pi pi-github text-xs"></i> Code
          </a>
        </div>
      </div>
    </article>
  </div>
</section>
