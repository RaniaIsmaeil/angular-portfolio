<section
  id="experience"
  class="container-p relative"
  observeInView
  (inView)="expIn = true"
  [@fadeUp]="expIn ? 'in' : 'out'"
>
  <!-- Background accent -->
  <div class="absolute top-1/3 left-0 w-72 h-72 bg-blue-500/5 rounded-full blur-[100px] pointer-events-none"></div>

  <h2 class="text-3xl font-bold text-center mb-2 text-white">
    Experience <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">& Education</span>
  </h2>
  <p class="text-center text-zinc-400 mb-8">
    My professional journey and qualifications.
  </p>

  <!-- Tabs -->
  <div class="flex justify-center mb-8">
    <div class="inline-flex rounded-full bg-zinc-800/50 p-1">
      <button
        (click)="activeTab = 'work'"
        class="px-5 py-2 rounded-full text-sm font-medium transition-all duration-200"
        [ngClass]="activeTab === 'work' ? 'bg-gradient-to-r from-blue-600 to-cyan-500 text-white' : 'text-zinc-400 hover:text-white'"
      >
        Work
      </button>
      <button
        (click)="activeTab = 'education'"
        class="px-5 py-2 rounded-full text-sm font-medium transition-all duration-200"
        [ngClass]="activeTab === 'education' ? 'bg-gradient-to-r from-blue-600 to-cyan-500 text-white' : 'text-zinc-400 hover:text-white'"
      >
        Education
      </button>
    </div>
  </div>

  <!-- Work Experience -->
  <div *ngIf="activeTab === 'work'" class="relative" @slideIn>
    <div class="space-y-5">
      <div
        *ngFor="let job of experience; let i = index"
        class="relative group"
      >
        <div class="bg-zinc-600/20 border border-zinc-500/30 rounded-2xl p-5 md:p-6 transition-all duration-300 hover:bg-zinc-600/30">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 mb-3">
            <div>
              <h3 class="font-semibold text-lg text-white group-hover:text-cyan-300 transition-colors">
                {{ job.title }}
              </h3>
              <p class="text-sm text-blue-300 mt-0.5">{{ job.company }}</p>
            </div>
            <span class="text-xs font-medium px-3 py-1 rounded-full bg-blue-500/10 text-blue-300 border border-blue-500/20 whitespace-nowrap">
              {{ job.date }}
            </span>
          </div>
          <ul class="text-sm text-zinc-300 space-y-2 mt-3">
            <li *ngFor="let d of job.details" class="flex items-start gap-2">
              <span class="text-cyan-400 mt-0.5">›</span>
              {{ d }}
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Education -->
  <div *ngIf="activeTab === 'education'" class="relative" @slideIn>
    <div class="space-y-5">
      <div
        *ngFor="let edu of education; let i = index"
        class="relative group"
      >
        <div class="bg-zinc-600/20 border border-zinc-500/30 rounded-2xl p-5 md:p-6 transition-all duration-300 hover:bg-zinc-600/30">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 mb-3">
            <div>
              <h3 class="font-semibold text-lg text-white group-hover:text-cyan-300 transition-colors">
                {{ edu.title }}
              </h3>
              <p class="text-sm text-blue-300 mt-0.5">{{ edu.institution }}</p>
            </div>
            <span class="text-xs font-medium px-3 py-1 rounded-full bg-blue-500/10 text-blue-300 border border-blue-500/20 whitespace-nowrap">
              {{ edu.date }}
            </span>
          </div>
          <ul *ngIf="edu.details.length" class="text-sm text-zinc-300 space-y-2 mt-3">
            <li *ngFor="let d of edu.details" class="flex items-start gap-2">
              <span class="text-cyan-400 mt-0.5">›</span>
              {{ d }}
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
