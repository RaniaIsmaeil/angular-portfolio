<header
  class="sticky top-0 z-50 bg-[#141419]/80 backdrop-blur border-b border-zinc-800/60"
>
  <div class="container-p flex items-center justify-between h-16">
    <a (click)="scrollTo('home')" class="flex items-center gap-0.5 cursor-pointer">
      <span class="text-3xl font-bold text-white">R</span>
      <span class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">I</span>
    </a>
    <nav class="hidden md:flex items-center gap-8">
      <a class="nav-link cursor-pointer" (click)="scrollTo('home')">About Me</a>
      <a class="nav-link cursor-pointer" (click)="scrollTo('projects')">Projects</a>
      <a class="nav-link cursor-pointer" (click)="scrollTo('skills')">Skills</a>
      <a class="nav-link cursor-pointer" (click)="scrollTo('experience')">Experience</a>
      <a class="nav-link cursor-pointer" (click)="scrollTo('contact')">Let's Connect</a>
      <a
        href="./assets/resume/Rania-Ismail-Resume.pdf"
        download="Rania-Ismail-Resume.pdf"
        class="border border-zinc-600 rounded-md px-4 py-1.5 text-sm text-white hover:bg-white hover:text-black transition-all duration-200 flex items-center gap-2"
      >
        Resume <i class="pi pi-arrow-down text-xs"></i>
      </a>
    </nav>
    <button
      class="md:hidden text-white"
      aria-label="Menu"
      (click)="toggleMenu()"
    >
      <i class="pi text-xl transition-transform duration-300" [ngClass]="mobileMenuOpen ? 'pi-times rotate-90' : 'pi-bars rotate-0'"></i>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div
    class="md:hidden overflow-hidden transition-all duration-300 ease-in-out bg-[#141419]/95 backdrop-blur-lg border-t border-zinc-800/60"
    [ngClass]="mobileMenuOpen ? 'max-h-80 opacity-100' : 'max-h-0 opacity-0 border-t-transparent'"
  >
    <nav class="flex flex-col px-6 py-4 gap-4">
      <a class="nav-link text-base cursor-pointer" (click)="scrollTo('home'); closeMenu()">About Me</a>
      <a class="nav-link text-base cursor-pointer" (click)="scrollTo('projects'); closeMenu()">Projects</a>
      <a class="nav-link text-base cursor-pointer" (click)="scrollTo('skills'); closeMenu()">Skills</a>
      <a class="nav-link text-base cursor-pointer" (click)="scrollTo('experience'); closeMenu()">Experience</a>
      <a class="nav-link text-base cursor-pointer" (click)="scrollTo('contact'); closeMenu()">Let's Connect</a>
      <a
        href="./assets/resume/Rania-Ismail-Resume.pdf"
        download="Rania-Ismail-Resume.pdf"
        class="border border-zinc-600 rounded-md px-4 py-2 text-sm text-white hover:bg-white hover:text-black transition-all duration-200 inline-flex items-center gap-2 w-fit"
        (click)="closeMenu()"
      >
        Resume <i class="pi pi-arrow-down text-xs"></i>
      </a>
    </nav>
  </div>
</header>
