<section
  id="skills"
  class="container-p"
  observeInView
  (inView)="skillsIn = true"
  [@fadeUp]="skillsIn ? 'in' : 'out'"
>
  <h2 class="text-3xl font-bold text-center mb-2 text-white">
    Skills <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">& Expertise</span>
  </h2>
  <p class="text-center text-zinc-400 mb-10">
    Tools and technologies I work with
  </p>

  <div class="grid sm:grid-cols-2 gap-6">
    <div *ngFor="let cat of categories" class="skill-item bg-zinc-600/20 border border-zinc-500/30 rounded-2xl p-6 transition-all duration-300 hover:bg-zinc-600/30">
      <h3 class="text-base font-semibold text-white mb-4 flex items-center gap-2">
        <span class="w-8 h-8 flex items-center justify-center rounded-lg bg-gradient-to-br from-blue-500/20 to-cyan-400/10">
          <mat-icon class="text-cyan-400" style="font-size: 18px; width: 18px; height: 18px;">{{ cat.icon }}</mat-icon>
        </span>
        {{ cat.title }}
      </h3>
      <div class="flex flex-wrap gap-2">
        <span
          *ngFor="let skill of cat.skills"
          class="px-3 py-1.5 rounded-lg text-sm font-medium text-zinc-300 border border-zinc-700/50 hover:text-white hover:bg-zinc-700/60 transition-all duration-200 cursor-default"
        >
          {{ skill.name }}
        </span>
      </div>
    </div>
  </div>
</section>
